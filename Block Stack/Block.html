<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Game</title>
    <link rel="stylesheet" href="Block.css">
</head>
<body>

    <div id="instruction">
        <div class="content">
            <p>Stack the blocks on top of each other</p>
            <p>Click, tap or press Space when a block is above the stack.</p>
            <p>Can you reach the blue color blocks?</p>
            <p>Click, tap or press Space to start the game.</p>
        </div>
    </div>

    <div id="results">
        <div class="content">
            <p>You missed the block!</p>
            <p>To reset the game, press R.</p>
        </div>
    </div>

    <div id="score">0</div>

    <!-- Corrected: Use img tags and relative paths for images -->

    </div>

    <!-- Keep ONLY JavaScript files inside your script tags -->

</body>
</html>
