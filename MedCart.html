<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - HealthCare Pharmacy</title>
    <link rel="stylesheet" href="Medicin.css">
</head>
<body>
    <!-- Header -->
    <header>
        <h1>HealthCare Pharmacy</h1>
        <nav>
            <a href="Medicin home.html">Home</a>
            <a href="MedMedicin.html">Medicines</a>
            <a href="MedAbout.html">About</a>
            <a href="MedContact.html">Contact</a>
            <a href="MedCart.html">Cart</a>
        </nav>
    </header>
    <!-- Cart Section -->
    <section class="cart-section">
        <h2>Your Shopping Cart</h2>
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Medicine</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="cartBody">
                <tr>
                    <td>Paracetamol 500 mg</td>
                    <td>₹50</td>
                    <td>
                        <input type="number" min="1" value="1"
                            onchange="updateTotal()"
                            class="qty">
                    </td>
                    <td class="itemTotal">₹50</td>
                </tr>
                <tr>
                    <td>Vitamin C Tablets</td>
                    <td>₹120</td>
                    <td>
                        <input type="number" min="1" value="1"
                            onchange="updateTotal()"
                            class="qty">
                    </td>
                    <td class="itemTotal">₹120</td>
                </tr>
            </tbody>
        </table>
        <h3 id="grandTotal">Grand Total: ₹170</h3>
        <button class="checkout-btn"> Proceed to Checkout </button>
    </section>
    <footer>
        <p>&copy; AMAN 2026 HealthCare Pharmacy. All Rights Reserved.</p>
    </footer>
    <script src="Medicin.js"></script>
</body>
</html>
