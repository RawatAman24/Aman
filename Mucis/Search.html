<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicHub | Search Songs</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<!-- Header -->
<header>
    <div class="logo">
        <h2><i class="fa-solid fa-music"></i> MusicHub</h2>
    </div>
    <nav>
        <ul>
            <li><a href="Home.html">Home</a></li>
            <li><a href="Artists.html">Artists</a></li>
            <li><a href="Playlist.html">Playlists</a></li>
            <li><a href="Search.html" class="active">Search</a></li>
            <li><a href="Login.html">Login</a></li>
            <li><a href="Profile.html">Profile</a></li>
            <li><a href="Favorites.html">Favorites</a></li>
        </ul>
    </nav>

</header>

<!-- Search Section -->

<section class="search-page">

    <h1>🔍 Search Songs</h1>

    <input
        type="text"
        id="searchBox"
        placeholder="Search by song or artist...">

</section>

<!-- Song List -->

<section class="song-container" id="songList">

    <div class="song-card">

        <img src="images/song1.jpg" alt="Perfect">

        <h3>Perfect</h3>

        <p>Ed Sheeran</p>

        <button class="play-btn">
            <i class="fa-solid fa-play"></i> Play
        </button>

        <button class="fav-btn">
            <i class="fa-solid fa-heart"></i>
        </button>

    </div>

    <div class="song-card">

        <img src="images/song2.jpg" alt="Believer">

        <h3>Believer</h3>

        <p>Imagine Dragons</p>

        <button class="play-btn">
            <i class="fa-solid fa-play"></i> Play
        </button>

        <button class="fav-btn">
            <i class="fa-solid fa-heart"></i>
        </button>

    </div>

    <div class="song-card">

        <img src="images/song3.jpg" alt="Blinding Lights">

        <h3>Blinding Lights</h3>

        <p>The Weeknd</p>

        <button class="play-btn">
            <i class="fa-solid fa-play"></i> Play
        </button>

        <button class="fav-btn">
            <i class="fa-solid fa-heart"></i>
        </button>

    </div>

    <div class="song-card">

        <img src="images/song4.jpg" alt="Shape of You">

        <h3>Shape of You</h3>

        <p>Ed Sheeran</p>

        <button class="play-btn">
            <i class="fa-solid fa-play"></i> Play
        </button>

        <button class="fav-btn">
            <i class="fa-solid fa-heart"></i>
        </button>

    </div>

</section>

<!-- Footer -->

<footer class="footer">

    <h3>MusicHub © 2026</h3>

    <p>Discover and enjoy your favorite music.</p>

</footer>

<script>

// Live Search

const search=document.getElementById("searchBox");

const cards=document.querySelectorAll(".song-card");

search.addEventListener("keyup",function(){

let value=search.value.toLowerCase();

cards.forEach(function(card){

let title=card.querySelector("h3").innerHTML.toLowerCase();

let artist=card.querySelector("p").innerHTML.toLowerCase();

if(title.includes(value)||artist.includes(value)){

card.style.display="block";

}else{

card.style.display="none";

}

});

});

// Play Button

document.querySelectorAll(".play-btn").forEach(function(btn){

btn.onclick=function(){

alert("Playing Song...");

}

});

// Favorite Button

document.querySelectorAll(".fav-btn").forEach(function(btn){

btn.onclick=function(){

btn.classList.toggle("liked");

if(btn.classList.contains("liked")){

btn.style.background="#ff1744";

btn.style.color="#fff";

}else{

btn.style.background="#1DB954";

btn.style.color="#fff";

}

}

});

</script>

</body>
</html>
