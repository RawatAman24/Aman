<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitZone Gym</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
body{
    background:#f4f4f4;
}
header{
   position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #111;
    color: white;
    padding: 15px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
}
nav
   nav a{
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 18px;
}
nav ul{
    display:flex;
    list-style:none;
}
nav ul li{
    margin:0 15px;
}
nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}
.hero{
    height:100vh;
    background:url("https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=1200")
    center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    text-align:center;
}
.hero h1{
    font-size:55px;
}
.hero p{
    font-size:20px;
    margin:15px 0;
}
.btn{
    background:orange;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:18px;
}
section{
    padding:60px 20px;
    text-align:center;
}
h2{
    margin-bottom:30px;
    color:#333;
}
.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}
.card{
    background:white;
    width:280px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
.card h3{
    margin-bottom:10px;
    color:orange;
}
.contact-form{
    max-width:500px;
    margin:auto;
}
.contact-form input,
.contact-form textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}
.contact-form button{
    width:100%;
    padding:12px;
    background:orange;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>
<body>
<header>
    <nav>
        <h2>FitZone Gym</h2>
        <ul>
            <li><a href="Home.html">Home</a></li>
            <li><a href="Service.html">Services</a></li>
            <li><a href="plans">Plans</a></li>
            <li><a href="contact">Contact</a></li>
        </ul>
    </nav>
</header>
<section class="hero">
    <h1>WELCOME TO FITZONE GYM</h1>
    <p>Build Your Body. Improve Your Health. Transform Your Life.</p>
    <button class="plan">Join Now</button>
</body>
</html>
