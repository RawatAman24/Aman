<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - FitZone Gym</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
        <div class="logo">FITZONE GYM</div>
        <nav>
            <a href="Home.html">Home</a>
            <a href="About.html">About</a>
            <a href="Service.html">Services</a>
            <a href="Plan.html">Plans</a>
            <a href="Contact.html">Contact</a>
        </nav>
    </header>
    <div class="contact-container">
        <h1>Contact Us</h1>
        <p>Have questions? Get in touch with us!</p>
        <div class="contact-box">
            <div class="contact-info">
                <h2>Gym Information</h2>
                <p><strong>📍 Address:</strong> Ahmedabad, Gujarat</p>
                <p><strong>📞 Phone:</strong> +91 9876543210</p>
                <p><strong>✉ Email:</strong> fitzonegym@gmail.com</p>
                <p><strong>🕒 Hours:</strong> Mon - Sat, 6 AM - 10 PM</p>
            </div>
            <div class="contact-form">
                <form>
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <input type="tel" placeholder="Phone Number" required>
                    <textarea rows="5" placeholder="Your Message" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </div>
    </div>
<footer>
        <p>© 2026 FitZone Gym | All Rights Reserved</p>
    </footer>
</body>
</html>
